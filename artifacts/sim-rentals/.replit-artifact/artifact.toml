kind = "web"
previewPath = "/"
title = "SMS SIM Rentals"
version = "1.0.0"
id = "artifacts/sim-rentals"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26179

[services.development]
run = "pnpm --filter @workspace/sim-rentals run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sim-rentals", "run", "build" ]
publicDir = "artifacts/sim-rentals/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26179"
BASE_PATH = "/"
